<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RVLT — RAW STREETWEAR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;900&display=swap');

        body {
            background-color: #0a0a0a;
            color: #e5e5e5;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .grain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_scntfc_grn.png');
            opacity: 0.05;
            pointer-events: none;
            z-index: 50;
        }

        .glitch {
            font-family: 'Syncopate', sans-serif;
            text-transform: uppercase;
            position: relative;
        }

        .rough-edge {
            clip-path: polygon(0% 0%, 100% 2%, 98% 100%, 3% 97%);
        }

        /* Estilo para el input de búsqueda */
        .search-input::placeholder {
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body>

    <div class="grain"></div>

    <section class="h-[70vh] flex flex-col justify-center items-center relative">
        <h1 class="glitch text-[15vw] leading-none font-black tracking-tighter md:text-[12vw]">RVLT</h1>
        <p class="text-red-600 font-mono tracking-[0.5em] text-sm mt-4 italic uppercase text-center">Not for everyone / Search the void</p>
    </section>

    <section class="px-6 md:px-20 mb-20">
        <div class="max-w-4xl mx-auto border border-zinc-800 p-4 md:p-8 bg-[#0d0d0d] rough-edge">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="searchInput" placeholder="BUSCAR PRENDA..." 
                    class="search-input flex-grow bg-transparent border-b-2 border-zinc-700 p-2 outline-none focus:border-red-600 transition-colors font-mono text-xl">
                
                <div class="flex gap-2 flex-wrap text-[10px] font-bold uppercase tracking-widest">
                    <button onclick="filterCategory('all')" class="border border-zinc-700 px-4 py-2 hover:bg-white hover:text-black transition">ALL</button>
                    <button onclick="filterCategory('hoodie')" class="border border-zinc-700 px-4 py-2 hover:bg-white hover:text-black transition">HOODIES</button>
                    <button onclick="filterCategory('pants')" class="border border-zinc-700 px-4 py-2 hover:bg-white hover:text-black transition">PANTS</button>
                    <button onclick="filterCategory('tees')" class="border border-zinc-700 px-4 py-2 hover:bg-white hover:text-black transition">TEES</button>
                </div>
            </div>
        </div>
    </section>

    <section class="p-6 md:p-20" id="productGrid">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-12">
            
            <div class="product-item md:col-span-7" data-name="oversized noose hoodie" data-category="hoodie">
                <div class="rough-edge bg-zinc-900 aspect-[4/5] overflow-hidden group">
                    <img src="https://images.unsplash.com/photo-1552374196-1ab2a1c593e8?auto=format&fit=crop&q=80&w=800" 
                         class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                </div>
                <div class="mt-4 flex justify-between uppercase">
                    <span class="text-2xl font-black italic">Oversized "Noose" Hoodie</span>
                    <span class="font-mono text-red-600">$120.00</span>
                </div>
            </div>

            <div class="product-item md:col-span-5 md:mt-32" data-name="cargo hybrid pants" data-category="pants">
                <div class="rough-edge bg-zinc-900 aspect-square overflow-hidden group">
                    <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&q=80&w=800" 
                         class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                </div>
                <div class="mt-4 flex justify-between uppercase">
                    <span class="text-xl font-black italic">Cargo Hybrid Pants</span>
                    <span class="font-mono text-red-600">$95.00</span>
                </div>
            </div>

            <div class="product-item md:col-span-6" data-name="graphic tee error" data-category="tees">
                <div class="rough-edge bg-zinc-900 aspect-video overflow-hidden group">
                    <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?auto=format&fit=crop&q=80&w=800" 
                         class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                </div>
                <div class="mt-4 flex justify-between uppercase">
                    <span class="text-xl font-black italic text-zinc-500">Graphic Tee "Error"</span>
                    <span class="font-mono text-red-600">$45.00</span>
                </div>
            </div>

        </div>
    </section>

    <footer class="p-10 border-t border-zinc-900 mt-20 flex justify-between items-center opacity-30 font-mono text-[10px]">
        <span>RVLT_SYSTEM_v1.0</span>
        <span>2026© REVOLT</span>
    </footer>

    <script>
        // LÓGICA DE BÚSQUEDA
        const searchInput = document.getElementById('searchInput');
        const products = document.querySelectorAll('.product-item');

        searchInput.addEventListener('input', (e) => {
            const value = e.target.value.toLowerCase();
            products.forEach(item => {
                const name = item.getAttribute('data-name');
                if (name.includes(value)) {
                    item.style.display = "block";
                } else {
                    item.style.display = "none";
                }
            });
        });

        // LÓGICA DE CATEGORÍAS
        function filterCategory(cat) {
            products.forEach(item => {
                const category = item.getAttribute('data-category');
                if (cat === 'all' || category === cat) {
                    item.style.display = "block";
                } else {
                    item.style.display = "none";
                }
            });
        }
    </script>
</body>
</html>
